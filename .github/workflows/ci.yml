name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build, type-check & audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (also type-checks)
        run: npm run build
        env:
          # Build does not need live keys; placeholders keep it hermetic.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_placeholder
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Dependency audit (high/critical)
        run: npm audit --audit-level=high
        continue-on-error: true # informational for now; triage required before merge

  # Added in the next infra task once ESLint/Prettier and tests are wired in:
  #   - lint (eslint + prettier --check)
  #   - test (vitest unit + RLS policy tests)
  #   - e2e (playwright)
